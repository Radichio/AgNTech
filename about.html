<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgNtech Connect — About</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F4F1E9; --cream2:#EFEADD; --paper:#F7F3E9; --ink:#0F2A20; --green:#0F2A20; --green-deep:#0A1F17;
    --body:#41473E; --muted:#7A8076; --gold:#B08A3C; --gold-2:#8F6F2E; --gold-dark:#C9A45A; --line:#DED7C6; --sage-dark:#9DB3A4;
    --df:'Libre Baskerville',Georgia,serif; --bf:'Helvetica Neue',Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:var(--bf);-webkit-font-smoothing:antialiased;line-height:1.6}
  .wrap{max-width:1000px;margin:0 auto;padding:0 26px}
  a{color:inherit}

  /* nav */
  nav.top{position:sticky;top:0;z-index:40;background:rgba(244,241,233,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  nav.top .wrap{display:flex;align-items:center;justify-content:space-between;height:62px;gap:18px}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--df);font-weight:600;font-size:20px;letter-spacing:-.01em;text-decoration:none;color:var(--ink)}
  .brand .n{color:var(--green)}
  .mark{width:36px;height:36px;flex:none}
  .navlinks{display:flex;gap:24px;align-items:center}
  .navlinks a{font-size:14px;color:var(--body);text-decoration:none;transition:.12s}
  .navlinks a:hover{color:var(--ink)}
  .navlinks a.active{color:var(--green);font-weight:600}
  @media(max-width:720px){.navlinks{display:none}}

  /* hero */
  .hero{padding:62px 0 34px;border-bottom:1px solid var(--line)}
  .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-2);font-weight:600}
  .hero h1{font-family:var(--df);font-weight:500;font-size:44px;line-height:1.1;margin-top:14px;max-width:16ch}
  @media(max-width:640px){.hero h1{font-size:33px}}
  .hero .lead{font-size:18px;color:var(--body);line-height:1.65;margin-top:20px;max-width:60ch}
  .hero .lead b{color:var(--ink);font-weight:600}

  section{padding:46px 0;border-bottom:1px solid var(--line)}
  .sec-eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold-2);font-weight:600;margin-bottom:18px}
  h2{font-family:var(--df);font-weight:500;font-size:27px;line-height:1.2;margin-bottom:18px}
  .story p{font-size:16.5px;color:var(--body);line-height:1.75;max-width:64ch;margin-bottom:18px}
  .story p b{color:var(--ink);font-weight:600}

  .pull{font-family:var(--df);font-style:italic;font-size:26px;color:var(--green);line-height:1.35;max-width:22ch;margin:30px 0;padding-left:22px;border-left:3px solid var(--gold-dark)}

  .why p{font-size:16.5px;color:var(--body);line-height:1.75;max-width:64ch;margin-bottom:18px}
  .why p b{color:var(--ink);font-weight:600}
  .mission{background:var(--cream2);border:1px solid var(--line);border-left:3px solid var(--gold-dark);border-radius:0 12px 12px 0;padding:22px 26px;margin-top:8px;max-width:66ch}
  .mission .ml{font-family:var(--df);font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-2);font-weight:700;margin-bottom:9px}
  .mission p{font-family:var(--df);font-size:17px;color:var(--ink);line-height:1.6;margin:0}

  .approach > p{font-size:16.5px;color:var(--body);line-height:1.75;max-width:64ch;margin-bottom:22px}
  .pillars{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;margin:6px 0 26px}
  @media(max-width:680px){.pillars{grid-template-columns:1fr}}
  .pillar h4{font-family:var(--df);font-size:18px;color:var(--green);margin-bottom:7px}
  .pillar p{font-size:14px;color:var(--body);line-height:1.6}
  .align{font-size:16.5px;color:var(--body);line-height:1.75;max-width:64ch}
  .align b{color:var(--ink)}
  .firmnote{font-size:14.5px;color:var(--muted);line-height:1.65;max-width:62ch;margin-top:22px;padding-top:18px;border-top:1px solid var(--line)}
  .team{background:var(--cream2)}
  .team .member{padding:20px 0;border-bottom:1px solid var(--line)}
  .team .member:first-of-type{padding-top:4px}
  .m-name{font-family:var(--df);font-size:20px;color:var(--ink)}
  .m-role{font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--gold-2);font-weight:700;margin-top:4px}
  .m-firm{font-size:13.5px;color:var(--muted);margin-top:4px}
  .m-firm a{color:var(--gold-2);text-decoration:none;border-bottom:1px solid var(--gold-dark)}
  .m-bio{font-size:15.5px;color:var(--body);line-height:1.65;margin-top:10px;max-width:62ch}
  .benchnote{font-size:14.5px;color:var(--muted);line-height:1.65;max-width:62ch;margin-top:20px;font-style:italic}

  /* close */
  .close{padding:52px 0;text-align:center}
  .close h2{font-size:28px;max-width:24ch;margin:0 auto 22px}
  .ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .btn{display:inline-block;padding:13px 24px;border-radius:10px;font-size:14.5px;font-weight:600;text-decoration:none;transition:.14s}
  .btn.primary{background:var(--green);color:var(--cream)} .btn.primary:hover{background:var(--green-deep)}
  .btn.ghost{border:1px solid var(--gold-dark);color:var(--green)} .btn.ghost:hover{background:var(--paper)}

  footer{background:var(--green-deep);color:var(--sage-dark);font-size:13.5px;padding:30px 0}
  footer .row{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  footer .n{color:var(--gold-dark)}
  footer .treaty{justify-content:center;margin-top:14px;border-top:1px solid rgba(255,255,255,.08);padding-top:14px}
  footer .treaty span{text-align:center;max-width:72ch;line-height:1.5}
</style>
</head>
<body>

  <!-- ===== PRIVATE-PREVIEW PASSWORD GATE — delete this whole block to make public ===== -->
  <div id="gate" style="position:fixed;inset:0;z-index:99999;background:#0F2A20;display:flex;align-items:center;justify-content:center;font-family:'Helvetica Neue',Arial,sans-serif">
    <div style="text-align:center;width:320px;max-width:86vw">
      <svg viewBox="0 0 48 48" width="46" height="46" style="margin-bottom:16px"><rect x="9" y="11" width="30" height="4" fill="#F4F1E9"/><rect x="11" y="15" width="4" height="22" fill="#F4F1E9"/><rect x="33" y="15" width="4" height="22" fill="#F4F1E9"/><rect x="22" y="18" width="4" height="16" fill="#C9A45A"/><rect x="17" y="36" width="14" height="3.5" fill="#F4F1E9"/></svg>
      <div style="font-family:Georgia,'Times New Roman',serif;color:#F4F1E9;font-size:21px;margin-bottom:8px">AgNtech Connect</div>
      <div style="color:#9DB3A4;font-size:13px;margin-bottom:18px;line-height:1.5">Private preview — please enter the password.</div>
      <input id="gpw" type="password" placeholder="Password" style="width:100%;padding:12px 13px;border-radius:9px;border:1px solid #2C4A3B;background:#15352A;color:#F4F1E9;font-size:14px;outline:none;font-family:inherit">
      <div id="gerr" style="color:#E2B66A;font-size:12.5px;height:15px;margin-top:7px"></div>
      <button id="gbtn" style="width:100%;margin-top:6px;padding:12px;border:none;border-radius:9px;background:#B08A3C;color:#0F2A20;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">Enter</button>
    </div>
  </div>
  <script>
    var GATE_PASSWORD = "terry-preview-26";
    (function(){ try{ if(sessionStorage.getItem('agn_gate')==='ok'){ var g=document.getElementById('gate'); if(g) g.parentNode.removeChild(g); } }catch(e){} })();
    function gateOpen(){ if(document.getElementById('gpw').value === GATE_PASSWORD){ try{ sessionStorage.setItem('agn_gate','ok'); }catch(e){} var g=document.getElementById('gate'); if(g) g.parentNode.removeChild(g); } else { document.getElementById('gerr').textContent='Incorrect — try again.'; } }
    document.getElementById('gbtn').addEventListener('click', gateOpen);
    document.getElementById('gpw').addEventListener('keydown', function(e){ if(e.key==='Enter') gateOpen(); });
    document.getElementById('gpw').focus();
  </script>

  <!-- About temporarily shown as 404. Full page preserved in about-FULL-backup.html — restore when ready. -->
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;background:var(--cream,#F4F1E9);padding:40px 24px;font-family:'Helvetica Neue',Arial,sans-serif">
    <div style="font-family:'Libre Baskerville',Georgia,serif;font-size:88px;line-height:1;color:#0F2A20;font-weight:700;letter-spacing:-.02em">404</div>
    <div style="width:46px;height:3px;background:#B08A3C;margin:22px auto"></div>
    <div style="font-family:'Libre Baskerville',Georgia,serif;font-size:22px;color:#0F2A20;margin-bottom:10px">Page not found</div>
    <p style="color:#41473E;font-size:14px;max-width:46ch;line-height:1.55;margin:0 0 28px">The page you're looking for isn't available.</p>
    <a href="index.html" style="display:inline-flex;align-items:center;gap:9px;background:#0F2A20;color:#F4F1E9;text-decoration:none;padding:11px 21px;border-radius:8px;font-size:13.5px;font-weight:600">← Back to AgNtech Connect</a>
  </div>

</body>
</html>
